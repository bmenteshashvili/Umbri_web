<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="4" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply" result="blend"/>
      <feComposite in="blend" in2="SourceGraphic" operator="in"/>
    </filter>
    <filter id="fine">
      <feTurbulence baseFrequency="0.9" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply" result="blend2"/>
      <feComposite in="blend2" in2="SourceGraphic" operator="in"/>
    </filter>
    <radialGradient id="vignette" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#3a3830" stop-opacity="1"/>
      <stop offset="60%" stop-color="#252422" stop-opacity="1"/>
      <stop offset="100%" stop-color="#111111" stop-opacity="1"/>
    </radialGradient>
    <linearGradient id="topfade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d0d0d"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <linearGradient id="botfade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="100%" stop-color="#0d0d0d"/>
    </linearGradient>
  </defs>

  <!-- Base fill -->
  <rect width="1920" height="1080" fill="url(#vignette)"/>

  <!-- Horizontal scratches / texture lines -->
  <g opacity="0.06" stroke="#ccc" stroke-width="1">
    <line x1="0" y1="180"  x2="1920" y2="182"/>
    <line x1="0" y1="310"  x2="1920" y2="308"/>
    <line x1="0" y1="490"  x2="1920" y2="493"/>
    <line x1="0" y1="670"  x2="1920" y2="668"/>
    <line x1="0" y1="820"  x2="1920" y2="822"/>
  </g>

  <!-- Grain overlay rect -->
  <rect width="1920" height="1080" filter="url(#grain)" opacity="0.07"/>
  <rect width="1920" height="1080" filter="url(#fine)" opacity="0.04"/>

  <!-- Top fade -->
  <rect width="1920" height="300" fill="url(#topfade)" opacity="0.7"/>
  <!-- Bottom fade -->
  <rect y="780" width="1920" height="300" fill="url(#botfade)" opacity="0.7"/>

  <!-- Subtle vertical center glow -->
  <ellipse cx="960" cy="480" rx="600" ry="350" fill="#50493e" opacity="0.08"/>

  <!-- Replace this file with your band photo (hero-bg.jpg or hero-bg.webp) -->
  <!-- Update the reference in css/style.css: url('../images/hero-bg.jpg') -->
</svg>
